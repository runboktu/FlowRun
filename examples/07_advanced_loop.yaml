# 高级示例 - 循环执行
#
# 这个示例展示：
# - ForEach 循环遍历数组
# - While 条件循环
# - Range 范围循环
# - 循环变量的使用

name: "循环执行示例"
description: "演示各种循环类型的使用"

version: "1.0.0"

inputs:
  - name: items
    type: string
    required: false
    default: "apple,banana,cherry"
    description: "逗号分隔的项目列表"

steps:
  # 初始化项目列表
  - id: init_items
    name: "初始化项目列表"
    type: shell
    run: "echo '项目列表已准备'"

  # ForEach 循环：遍历数组
  - id: process_items
    name: "处理每个项目"
    type: loop
    loop:
      over: "variables.item_list"
      as: "item"
    do_steps:
      - id: process_single_item
        name: "处理单个项目"
        type: shell
        run: |
          INDEX="${{ loop.index }}"
          ITEM="${{ loop.item }}"
          echo "[$INDEX] 处理项目: $ITEM"
    depends_on:
      - init_items

  # Range 循环：数字范围
  - id: range_loop
    name: "范围循环"
    type: loop
    loop:
      start: 1
      end: 5
    do_steps:
      - id: range_step
        name: "范围步骤"
        type: shell
        run: "echo '迭代次数: ${{ loop.current }}'"

variables:
  item_list:
    - "任务A"
    - "任务B"
    - "任务C"
  retry_count: 0

outputs:
  processed_count: "${{ steps.process_items.iterations }}"
