# 基础示例 - Shell 命令执行
#
# 这个示例展示 Shell 步骤的基本用法：
# - 执行系统命令
# - 设置环境变量
# - 捕获命令输出
# - 步骤依赖关系

name: "基础 Shell 命令示例"
description: "演示如何执行 Shell 命令和处理输出"

version: "1.0.0"

inputs:
  - name: project_name
    type: string
    required: true
    description: "项目名称"
  - name: environment
    type: string
    required: false
    default: "development"
    description: "部署环境"

config:
  timeout: "5m"

steps:
  # 创建项目目录
  - id: create_dir
    name: "创建项目目录"
    type: shell
    run: "mkdir -p /tmp/${{ inputs.project_name }} && echo '目录已创建'"
    env:
      PROJECT: "${{ inputs.project_name }}"

  # 写入配置文件
  - id: write_config
    name: "写入配置文件"
    type: shell
    run: |
      cat > /tmp/${{ inputs.project_name }}/config.json << EOF
      {
        "name": "${{ inputs.project_name }}",
        "env": "${{ inputs.environment }}",
        "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
      EOF
      echo "配置文件已写入"
    depends_on:
      - create_dir

  # 验证文件
  - id: verify
    name: "验证配置文件"
    type: shell
    run: "cat /tmp/${{ inputs.project_name }}/config.json"
    depends_on:
      - write_config

outputs:
  config_path: "/tmp/${{ inputs.project_name }}/config.json"
  config_content: "${{ steps.verify.stdout }}"
