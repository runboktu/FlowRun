# AI 作曲编曲工作流
#
# 流程（3 步）：
#   1. Agent: 给歌词添加 Suno Tag
#   2. Agent: 同时生成中英双语作曲提示词（带工具：check_char_count / strip_whitespace）
#   3. Shell: 汇总写入文件
#
# 运行：
#   DEEPSEEK_API_KEY=sk-xxx cargo run --example 19_music_composer -- \
#     --lyrics lyrics.txt --style "heavy blues, saxophone Solo" --output-dir /tmp/music-output

name: "AI 作曲编曲工作流"
description: "原始歌词 → Suno Tag 标注 → 中英双语作曲提示词"
version: "2.0.0"

inputs:
  - name: lyrics
    type: string
    required: true
    description: "原始歌词文本"

  - name: style
    type: string
    required: true
    description: "歌曲风格提示词（如：heavy blues, saxophone Solo）"

  - name: output_dir
    type: string
    required: false
    default: "/tmp/music-output"
    description: "输出目录"

steps:
  # ── Step 1: 给歌词添加 Suno Tag ──────────────────────────
  - id: tag_lyrics
    name: "歌词添加 Suno Tag"
    type: agent
    agent_input: |
      请为以下歌词添加 Suno Tag 标注。用户指定的风格是：${{ inputs.style }}

      原始歌词：
      ${{ inputs.lyrics }}

      请直接输出添加了 Suno Tag 的完整歌词，不要多余解释。

    agent_system_prompt: |
      你是一个专业的 Suno AI 音乐制作专家。你的任务是为歌词添加 Suno Tag 元标签，使 Suno AI 能够根据标签生成高质量音乐。

      ## 可用的 Suno Tag

      ### 段落结构标签
      - [Intro] 前奏
      - [Verse] / [Verse 1] / [Verse 2] 主歌
      - [Pre-Chorus] 过渡段
      - [Chorus] 副歌（高潮）
      - [Bridge] 桥段
      - [Post-Chorus] 副歌后段
      - [Outro] / [End] / [Fade Out] / [Fade to End] 结尾
      - [Hook] 钩子

      ### 人声标签
      - [female vocal] / [passionate male vocalist] / [MurMur] / [overlapping vocals] / [Spoken word]

      ### 音乐标签
      - [Instrumental] / [Instrumental Solo] / [Guitar Solo] / [Drums] / [Break] / [Build-up] / [drop] / [Stop]

      ### 节奏与风格标签
      - [Spoken fast] / [Rap] / [Male Rap] / [silence] / [Crying] / [Laugh] / [Live Crowd]

      ### 制作标签
      - [Finale] / [Finale Chorus] / [Final Master] / [Clean mix] / [Expensive production] / [Dry Reverb]

      ### 标注规则
      1. 歌词开头用 [Intro] + 风格/乐器方括号（如 [heavy blues, saxophone Solo]）
      2. 按内容划分 [Verse] / [Pre-Chorus] / [Chorus] / [Bridge]
      3. 适当位置添加 [Instrumental] 间奏
      4. 副歌重复用 [Chorus]
      5. 结尾用 [Outro] 或 [Fade to End]
      6. 段落之间空行分隔

    agent_max_iterations: 1

  # ── Step 2: 生成中英双语作曲提示词 ────────────────────────
  - id: compose_prompt
    name: "生成中英双语作曲提示词"
    type: agent
    depends_on:
      - tag_lyrics
    agent_input: |
      已标注 Suno Tag 的歌词：
      ${{ steps.tag_lyrics.answer }}

      用户指定的风格：${{ inputs.style }}

      请作为世界级顶级作曲/编曲家，完成以下两项任务：
      1. 生成中文详细作曲提示词
      2. 将中文提示词翻译为紧凑英文（严格 < 1000 字符，无换行/多余空格）

      你拥有以下工具可以调用：
      - check_char_count: 检查文本字符数是否在限制内
      - strip_whitespace: 压缩文本中的多余空白字符

      **流程**：
      A. 先在 <chinese>...</chinese> 标签内输出中文作曲提示词
      B. 然后在 <english>...</english> 标签内输出英文版
      C. 生成英文后，调用 check_char_count 工具验证字符数
      D. 如果超过 1000 字符，调用 strip_whitespace 工具压缩，再验证
      E. 如果仍超限，精简内容后重试

    agent_system_prompt: |
      你是一位世界级顶级作曲家和编曲家，精通所有音乐风格。

      ## 任务
      根据歌词内容和风格，从以下 10 个维度生成作曲提示词：
      人声 / 鼓 / 贝斯 / 打击乐 / 键盘 / 吉他 / 管乐弦乐 / 和声 / 曲式结构 / 混音质感

      ## 输出格式
      必须使用以下 XML 标签包裹两部分：
      <chinese>
      （中文作曲提示词，每个维度一行）
      </chinese>
      <english>
      （英文 Suno 提示词，一整段紧凑文本）
      </english>

      ## 英文部分严格要求
      1. 总字符数严格 < 1000（含所有标点和空格）
      2. 不允许任何换行符 \n
      3. 不允许连续空格（多个空格压缩为 1 个）
      4. 不允许 Tab 字符
      5. 不使用 Markdown 格式

      ## 工具使用
      你拥有以下工具：
      - check_char_count(text, max_chars=1000) → 返回字符数和是否超限
      - strip_whitespace(text) → 返回压缩空白后的文本

      生成英文后必须调用 check_char_count 验证。如果超限：
      1. 先调用 strip_whitespace 压缩空白
      2. 再 check_char_count 验证
      3. 仍超限则主动精简内容

    agent_max_iterations: 5

  # ── Step 3: 将结果写入文件 ────────────────────────────────
  - id: write_output
    name: "写入输出文件"
    type: shell
    depends_on:
      - tag_lyrics
      - compose_prompt
    run: "echo 'done'"

outputs:
  tagged_lyrics: "${{ steps.tag_lyrics.answer }}"
  compose_result: "${{ steps.compose_prompt.answer }}"
  output_dir: "${{ inputs.output_dir }}"
