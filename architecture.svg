<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1150" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <!-- Gradient for background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- Glow effect for borders -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1150" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700" letter-spacing="0.5">FlowRun Architecture</text>
  <text x="700" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Declarative Workflow Engine for AI Agents  ·  Rust  ·  YAML-driven  ·  DAG-based Scheduler</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Layer 1: CLI / API Entry -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="430" y="100" width="540" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="445" y="122" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.5">ENTRY LAYER</text>
  <!-- CLI Box -->
  <rect x="445" y="132" width="160" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="525" y="154" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">CLI (main.rs)</text>
  <!-- Library API Box -->
  <rect x="625" y="132" width="160" height="36" rx="6" fill="#3b1f5e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="705" y="154" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">Library API (lib.rs)</text>
  <!-- Commands -->
  <rect x="805" y="132" width="150" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="880" y="154" text-anchor="middle" fill="#cbd5e1" font-size="12">run / resume / validate</text>

  <!-- Arrow down -->
  <line x1="700" y1="180" x2="700" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Layer 2: Core Engine (the big container) -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="60" y="230" width="1280" height="460" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="75" y="258" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">CORE ENGINE</text>

  <!-- FlowRunner -->
  <rect x="570" y="245" width="260" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="700" y="267" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">FlowRunner</text>
  <text x="700" y="284" text-anchor="middle" fill="#60a5fa" font-size="10">from_file() · run() · plan() · resume()</text>

  <!-- Arrows from FlowRunner to sub-modules -->
  <line x1="620" y1="295" x2="260" y2="340" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="700" y1="295" x2="700" y2="340" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="295" x2="1140" y2="340" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Parser -->
  <rect x="140" y="340" width="240" height="90" rx="8" fill="#162032" stroke="#1d4ed8" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="260" y="365" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">WorkflowParser</text>
  <text x="260" y="386" text-anchor="middle" fill="#94a3b8" font-size="11">YAML / JSON → WorkflowDefinition</text>
  <text x="260" y="404" text-anchor="middle" fill="#64748b" font-size="10">serde_yaml · serde · validation</text>
  <text x="152" y="340" fill="#475569" font-size="9">core/parser.rs</text>

  <!-- DAG Scheduler -->
  <rect x="580" y="340" width="240" height="90" rx="8" fill="#1a1640" stroke="#6d28d9" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="700" y="365" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">DagScheduler</text>
  <text x="700" y="386" text-anchor="middle" fill="#94a3b8" font-size="11">adjacency list · topological sort</text>
  <text x="700" y="404" text-anchor="middle" fill="#64748b" font-size="10">cycle detection · batch scheduling</text>
  <text x="592" y="340" fill="#475569" font-size="9">core/dag.rs</text>

  <!-- Template Engine -->
  <rect x="1020" y="340" width="240" height="90" rx="8" fill="#1a2e1a" stroke="#16a34a" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="1140" y="365" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">TemplateEngine</text>
  <text x="1140" y="386" text-anchor="middle" fill="#94a3b8" font-size="11">${{ vars }} · filters · expressions</text>
  <text x="1140" y="404" text-anchor="middle" fill="#64748b" font-size="10">uppercase · join · truncate · slice...</text>
  <text x="1032" y="340" fill="#475569" font-size="9">core/template.rs</text>

  <!-- Arrow down from DAG + Template to Scheduler -->
  <line x1="700" y1="430" x2="700" y2="475" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="1140" y1="430" x2="900" y2="500" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="430" x2="500" y2="500" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Scheduler -->
  <rect x="460" y="480" width="480" height="100" rx="10" fill="#1e293b" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="508" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">Scheduler</text>
  <text x="700" y="528" text-anchor="middle" fill="#94a3b8" font-size="12">execute_batch() · Semaphore(max_concurrent) · execute_step() · resume()</text>
  <text x="700" y="548" text-anchor="middle" fill="#64748b" font-size="11">tokio::spawn · batch-parallel · checkpoint save · failure strategy (Abort/Pause/Continue)</text>
  <text x="472" y="481" fill="#475569" font-size="9">core/dag.rs</text>

  <!-- ExecutionContext -->
  <rect x="1020" y="500" width="240" height="70" rx="8" fill="#1a2744" stroke="#2563eb" stroke-width="1"/>
  <text x="1140" y="525" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">ExecutionContext</text>
  <text x="1140" y="546" text-anchor="middle" fill="#94a3b8" font-size="11">inputs · variables · step_outputs</text>
  <text x="1032" y="501" fill="#475569" font-size="9">core/context.rs</text>

  <!-- Type System -->
  <rect x="1020" y="590" width="240" height="70" rx="8" fill="#2d1f3d" stroke="#9333ea" stroke-width="1"/>
  <text x="1140" y="615" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="600">Type System</text>
  <text x="1140" y="636" text-anchor="middle" fill="#94a3b8" font-size="11">WorkflowDefinition · StepDefinition · 9 StepTypes</text>
  <text x="1032" y="591" fill="#475569" font-size="9">core/types.rs</text>

  <line x1="700" y1="580" x2="1020" y2="545" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="700" y1="580" x2="1020" y2="615" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Layer 3: Executors (9 step types) -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Arrow down from Scheduler to Executors -->
  <line x1="700" y1="620" x2="700" y2="720" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,4"/>

  <rect x="60" y="720" width="1280" height="250" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="75" y="748" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">EXECUTORS — Executor Trait (execute: &amp;StepDefinition, &amp;ExecutionContext → StepResult)</text>

  <!-- Row 1: 1-4 -->
  <!-- HTTP Executor -->
  <rect x="85" y="760" width="140" height="60" rx="8" fill="#1c2333" stroke="#38bdf8" stroke-width="1"/>
  <text x="155" y="784" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">HTTP</text>
  <text x="155" y="804" text-anchor="middle" fill="#64748b" font-size="10">reqwest · GET/POST/PUT</text>

  <!-- Shell Executor -->
  <rect x="245" y="760" width="140" height="60" rx="8" fill="#1c2333" stroke="#34d399" stroke-width="1"/>
  <text x="315" y="784" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">Shell</text>
  <text x="315" y="804" text-anchor="middle" fill="#64748b" font-size="10">tokio::process::sh</text>

  <!-- Parallel Executor -->
  <rect x="405" y="760" width="140" height="60" rx="8" fill="#1c2333" stroke="#fbbf24" stroke-width="1"/>
  <text x="475" y="784" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Parallel</text>
  <text x="475" y="804" text-anchor="middle" fill="#64748b" font-size="10">concurrent sub-steps</text>

  <!-- Loop Executor -->
  <rect x="565" y="760" width="140" height="60" rx="8" fill="#1c2333" stroke="#fb923c" stroke-width="1"/>
  <text x="635" y="784" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="600">Loop</text>
  <text x="635" y="804" text-anchor="middle" fill="#64748b" font-size="10">forEach / while / range</text>

  <!-- Row 2: 5-9 -->
  <!-- Condition Executor -->
  <rect x="85" y="840" width="140" height="60" rx="8" fill="#1c2333" stroke="#e879f9" stroke-width="1"/>
  <text x="155" y="864" text-anchor="middle" fill="#e879f9" font-size="13" font-weight="600">Condition</text>
  <text x="155" y="884" text-anchor="middle" fill="#64748b" font-size="10">if/then/else branches</text>

  <!-- Workflow Executor -->
  <rect x="245" y="840" width="140" height="60" rx="8" fill="#1c2333" stroke="#f87171" stroke-width="1"/>
  <text x="315" y="864" text-anchor="middle" fill="#f87171" font-size="13" font-weight="600">Sub-Workflow</text>
  <text x="315" y="884" text-anchor="middle" fill="#64748b" font-size="10">nested DAG execution</text>

  <!-- Approve Executor -->
  <rect x="405" y="840" width="140" height="60" rx="8" fill="#1c2333" stroke="#a3e635" stroke-width="1"/>
  <text x="475" y="864" text-anchor="middle" fill="#a3e635" font-size="13" font-weight="600">Approve</text>
  <text x="475" y="884" text-anchor="middle" fill="#64748b" font-size="10">manual approval gate</text>

  <!-- Agent Executor -->
  <rect x="565" y="840" width="140" height="60" rx="8" fill="#1c2333" stroke="#38bdf8" stroke-width="1"/>
  <text x="635" y="864" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">Agent</text>
  <text x="635" y="884" text-anchor="middle" fill="#64748b" font-size="10">ReAct inference loop</text>

  <!-- Tool Executor -->
  <rect x="725" y="840" width="140" height="60" rx="8" fill="#1c2333" stroke="#818cf8" stroke-width="1"/>
  <text x="795" y="864" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="600">Tool</text>
  <text x="795" y="884" text-anchor="middle" fill="#64748b" font-size="10">registered tool call</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Side Panel: Agent Module -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="885" y="760" width="430" height="190" rx="12" fill="#0c1929" stroke="#1e40af" stroke-width="1.5"/>
  <text x="900" y="788" fill="#3b82f6" font-size="12" font-weight="700" letter-spacing="0.5">AGENT MODULE</text>
  <text x="900" y="806" fill="#64748b" font-size="9">agent/</text>

  <!-- ReAct Agent -->
  <rect x="900" y="816" width="180" height="50" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="990" y="838" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">ReActAgent</text>
  <text x="990" y="856" text-anchor="middle" fill="#60a5fa" font-size="9">Think → Act → Observe loop</text>

  <!-- LlmProvider -->
  <rect x="1100" y="816" width="195" height="50" rx="6" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="1197" y="838" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">LlmProvider (trait)</text>
  <text x="1197" y="856" text-anchor="middle" fill="#a78bfa" font-size="9">OpenAI · Claude · Ollama ...</text>

  <!-- ToolRegistry + Parser -->
  <rect x="900" y="880" width="115" height="50" rx="6" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="957" y="902" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">ToolRegistry</text>
  <text x="957" y="920" text-anchor="middle" fill="#64748b" font-size="9">tool registration</text>

  <rect x="1030" y="880" width="130" height="50" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="1095" y="902" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">ResponseParser</text>
  <text x="1095" y="920" text-anchor="middle" fill="#64748b" font-size="9">XML / JSON output</text>

  <rect x="1175" y="880" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#ec4899" stroke-width="1"/>
  <text x="1235" y="902" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">AgentManager</text>
  <text x="1235" y="920" text-anchor="middle" fill="#64748b" font-size="9">session lifecycle</text>

  <!-- Arrow ReActAgent → LlmProvider -->
  <line x1="1080" y1="841" x2="1100" y2="841" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Arrow ReActAgent → ToolRegistry -->
  <line x1="990" y1="866" x2="957" y2="880" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Arrow ReActAgent → Parser -->
  <line x1="990" y1="866" x2="1095" y2="880" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Arrow ReActAgent → AgentManager -->
  <line x1="990" y1="866" x2="1235" y2="910" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Layer 4: Utilities -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="60" y="1010" width="1280" height="110" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="75" y="1038" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">UTILITIES &amp; CROSS-CUTTING</text>

  <!-- Checkpoint -->
  <rect x="85" y="1050" width="180" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="175" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Checkpoint Manager</text>
  <text x="175" y="1092" text-anchor="middle" fill="#64748b" font-size="10">save/restore · /tmp/flow-run-checkpoints</text>

  <!-- Retry Engine -->
  <rect x="290" y="1050" width="180" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="380" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Retry Engine</text>
  <text x="380" y="1092" text-anchor="middle" fill="#64748b" font-size="10">fixed · exponential · fibonacci + jitter</text>

  <!-- Error Handling -->
  <rect x="495" y="1050" width="180" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">WorkflowError</text>
  <text x="585" y="1092" text-anchor="middle" fill="#64748b" font-size="10">thiserror · typed errors · fix hints</text>

  <!-- Logging -->
  <rect x="700" y="1050" width="150" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="775" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Tracing</text>
  <text x="775" y="1092" text-anchor="middle" fill="#64748b" font-size="10">tracing · env-filter · structured</text>

  <!-- Rate Limiter -->
  <rect x="875" y="1050" width="150" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="950" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Rate Limiter</text>
  <text x="950" y="1092" text-anchor="middle" fill="#64748b" font-size="10">governor · leaky bucket</text>

  <!-- Cron / Schedule -->
  <rect x="1050" y="1050" width="150" height="55" rx="6" fill="#1c2333" stroke="#64748b" stroke-width="1"/>
  <text x="1125" y="1072" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Cron Scheduler</text>
  <text x="1125" y="1092" text-anchor="middle" fill="#64748b" font-size="10">cron expressions · timezone</text>

  <!-- Arrows from Executors to utils -->
  <line x1="700" y1="970" x2="175" y2="1050" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="700" y1="970" x2="585" y2="1050" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="700" y1="970" x2="950" y2="1050" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- External Dependencies (bottom) -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="700" y="1140" text-anchor="middle" fill="#475569" font-size="10">External: tokio · serde/serde_yaml · reqwest · clap · thiserror · governor · cron · notify · chrono · uuid · rand · regex · tracing · async-trait</text>

</svg>